name: Backend — Build & Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'onside-backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  build-and-deploy:
    name: Build & Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: onside-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build JAR
        run: ./mvnw clean package -DskipTests --no-transfer-progress

      - name: Get short SHA
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APP_NAME }}
          environment_name: ${{ secrets.EB_ENV_NAME }}
          region: ${{ secrets.AWS_REGION }}
          version_label: onside-${{ steps.vars.outputs.sha }}
          deployment_package: onside-backend/target/onside-0.0.1-SNAPSHOT.jar

      - name: Done
        run: echo "✅ Deployed onside-${{ steps.vars.outputs.sha }}"