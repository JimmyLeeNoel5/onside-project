# =============================================================================
# ONSIDE API - Application Properties
# Scope: User Registration & Login only
# =============================================================================

# -----------------------------------------------------------------------------
# APPLICATION
# -----------------------------------------------------------------------------
spring.application.name=onside-api
server.port=8080
server.servlet.context-path=/api/v1


# -----------------------------------------------------------------------------
# DATABASE - PostgreSQL
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/onside_us_soccer?currentSchema=onside_app_dev
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.properties.hibernate.default_schema=onside_app_dev


# -----------------------------------------------------------------------------
# JPA / HIBERNATE
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# -----------------------------------------------------------------------------
# FLYWAY
# -----------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/onside_us_soccer?currentSchema=onside_app_dev
spring.flyway.user=${DB_USERNAME:postgres}
spring.flyway.password=${DB_PASSWORD:}
spring.flyway.schemas=onside_app_dev
spring.flyway.default-schema=onside_app_dev
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline_existing_schema
spring.jpa.defer-datasource-initialization=false

# -----------------------------------------------------------------------------
# JWT - RSA Key Pair
# Generate keys first:
#   openssl genrsa -out src/main/resources/certs/private.pem 2048
#   openssl rsa -in src/main/resources/certs/private.pem -pubout -out src/main/resources/certs/public.pem
# -----------------------------------------------------------------------------
jwt.private-key-path=classpath:certs/private.pem
jwt.public-key-path=classpath:certs/public.pem
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000
jwt.issuer=onside.app

spring.jackson.mapper.default-view-inclusion=true

# -----------------------------------------------------------------------------
# CORS
# -----------------------------------------------------------------------------
cors.allowed-origins=http://localhost:5173
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true


# -----------------------------------------------------------------------------
# SPRINGDOC - Swagger UI
# Access at: http://localhost:8080/api/v1/swagger-ui.html
# -----------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.info.title=Onside API
springdoc.info.description=US Soccer Ecosystem REST API
springdoc.info.version=1.0.0


# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging.level.com.onside=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.fasterxml.jackson=DEBUG


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.to=${MAIL_TO}
app.mail.from=${MAIL_FROM}
# -----------------------------------------------------------------------------
# VIRTUAL THREADS (Java 21 + Spring Boot 4)
# -----------------------------------------------------------------------------
spring.threads.virtual.enabled=true

