# =============================================================================
# ONSIDE API - Application Properties
# =============================================================================

# -----------------------------------------------------------------------------
# APPLICATION
# -----------------------------------------------------------------------------
spring.application.name=onside-api
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# -----------------------------------------------------------------------------
# DATABASE - PostgreSQL
# -----------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/onside_us_soccer?currentSchema=onside_app_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.properties.hibernate.default_schema=onside_app_dev

# -----------------------------------------------------------------------------
# JPA / HIBERNATE
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -----------------------------------------------------------------------------
# FLYWAY
# -----------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.url=${DB_URL:jdbc:postgresql://localhost:5432/onside_us_soccer?currentSchema=onside_app_dev}
spring.flyway.user=${DB_USERNAME:postgres}
spring.flyway.password=${DB_PASSWORD:}
spring.flyway.schemas=onside_app_dev
spring.flyway.default-schema=onside_app_dev
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline_existing_schema
spring.jpa.defer-datasource-initialization=false

# -----------------------------------------------------------------------------
# JWT
# -----------------------------------------------------------------------------
jwt.private-key-path=classpath:certs/private.pem
jwt.public-key-path=classpath:certs/public.pem
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000
jwt.issuer=onside.app

spring.jackson.mapper.default-view-inclusion=true

# -----------------------------------------------------------------------------
# CORS
# -----------------------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# -----------------------------------------------------------------------------
# SPRINGDOC - Swagger UI
# -----------------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.info.title=Onside API
springdoc.info.description=US Soccer Ecosystem REST API
springdoc.info.version=1.0.0

# -----------------------------------------------------------------------------
# LOGGING ? reduced for production
# -----------------------------------------------------------------------------
logging.level.com.onside=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.level.com.fasterxml.jackson=WARN

# -----------------------------------------------------------------------------
# MAIL
# -----------------------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.to=${MAIL_TO}
app.mail.from=${MAIL_FROM}

# -----------------------------------------------------------------------------
# VIRTUAL THREADS (Java 21 + Spring Boot 4)
# -----------------------------------------------------------------------------
spring.threads.virtual.enabled=true